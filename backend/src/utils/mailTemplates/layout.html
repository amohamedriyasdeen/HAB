<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 520px; margin: 40px auto; background: #fff; border-radius: 8px; padding: 32px; }
    .header { border-bottom: 2px solid #1976d2; padding-bottom: 16px; margin-bottom: 24px; }
    .header h1 { margin: 0; color: #1976d2; font-size: 22px; }
    .btn { display: inline-block; padding: 12px 28px; background: #1976d2; color: #fff; text-decoration: none; border-radius: 6px; font-size: 15px; }
    .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #eee; font-size: 12px; color: #999; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>HAB App</h1>
    </div>
    {{content}}
    <div class="footer">© {{year}} HAB App. All rights reserved.</div>
  </div>
</body>
</html>
